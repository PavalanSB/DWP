{% extends "base.html" %}
{% block title %}Login | Digital Wellness Platform{% endblock %}
{% block page_content %}
<div class="auth-card">
  <h1 class="auth-title">LOGIN</h1>
  <form method="post">
    <div class="mb-3 input-with-icon">
      <i class="bi bi-envelope input-icon"></i>
      <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
    </div>
    <div class="mb-3 input-with-icon">
      <i class="bi bi-lock input-icon"></i>
      <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
      <button type="button" class="password-toggle" data-target="password" aria-label="Toggle password visibility">
        <i class="bi bi-eye-slash"></i>
      </button>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="remember" name="remember" value="1">
      <label class="form-check-label" for="remember">Remember me</label>
    </div>
    <button type="submit" class="btn btn-login-primary w-100 mb-3">LOGIN</button>
  </form>
  <p class="auth-divider text-center">Or login with</p>
  <div class="row g-2">
    <div class="col-6">
      <a href="{{ url_for('auth.facebook_login') }}" class="btn btn-facebook w-100">
        <i class="bi bi-facebook me-2"></i>Facebook
      </a>
    </div>
    <div class="col-6">
      <a href="{{ url_for('auth.google_login') }}" class="btn btn-google w-100">
        <i class="bi bi-google me-2"></i>Google
      </a>
    </div>
  </div>
  <p class="auth-footer mt-3 mb-0">
    Not a member? <a href="{{ url_for('auth.register') }}">Sign up now</a>
  </p>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".password-toggle").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const targetId = this.getAttribute("data-target");
        const input = document.getElementById(targetId);
        const icon = this.querySelector("i");
        if (!input) return;
        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        } else {
          input.type = "password";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        }
      });
    });
  });
</script>
{% endblock %}
